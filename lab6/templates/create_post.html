<!DOCTYPE html>
<html>
<head>
    <title>Шинэ мэдээлэл нэмэх</title>
    <style>
        .container { width: 50%; margin: 50px auto; font-family: Arial; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-control { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Шинэ пост нэмэх</h2>
        <form method="POST">
            {% csrf_token %}  {{ form.as_p }}   <button type="submit" class="btn">Хадгалах</button>
        </form>
        <br>
        <a href="{% url 'post_list' %}">Буцах</a>
    </div>
</body>
</html>
